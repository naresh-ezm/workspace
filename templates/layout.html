<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EC2 Desktop Manager</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-light min-vh-100">

  {{if .CurrentUser}}
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-pc-display-horizontal me-2 text-info"></i>EC2 Desktop Manager
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light small">
          <i class="bi bi-person-circle me-1"></i>
          <strong>{{.CurrentUser.Username}}</strong>
          {{if eq (printf "%s" .CurrentUser.Role) "admin"}}
            <span class="badge bg-warning text-dark ms-1">Admin</span>
          {{else}}
            <span class="badge bg-secondary ms-1">Developer</span>
          {{end}}
        </span>
        {{if eq (printf "%s" .CurrentUser.Role) "admin"}}
        <a href="/admin" class="btn btn-outline-info btn-sm">
          <i class="bi bi-shield-lock me-1"></i>Admin
        </a>
        {{else}}
        <a href="/dashboard" class="btn btn-outline-light btn-sm">
          <i class="bi bi-speedometer2 me-1"></i>Dashboard
        </a>
        {{end}}
        <form method="POST" action="/logout" class="m-0">
          <button type="submit" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </form>
      </div>
    </div>
  </nav>
  {{end}}

  <main class="container-fluid px-4 py-4">
    {{embed}}
  </main>

  <footer class="text-center text-muted small py-3 border-top mt-auto">
    EC2 Desktop Manager &mdash; powered by Go &amp; Fiber
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmgFqinTOvnmL9RtCsL7LHPFk1o"
          crossorigin="anonymous"></script>
</body>
</html>
