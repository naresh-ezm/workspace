<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-pc-display-horizontal display-3 text-primary"></i>
      <h2 class="fw-bold mt-2">EC2 Desktop Manager</h2>
      <p class="text-muted">Sign in with your username and PIN</p>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">

        {{if .Error}}
        <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          <span>{{.Error}}</span>
        </div>
        {{end}}

        <form method="POST" action="/login" autocomplete="off" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-medium">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                placeholder="your-username"
                required
                autofocus
                maxlength="64"
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="pin" class="form-label fw-medium">PIN</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-key"></i></span>
              <input
                type="password"
                id="pin"
                name="pin"
                class="form-control"
                placeholder="••••••••"
                required
                maxlength="128"
              />
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </div>
        </form>

      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      Contact your administrator if you cannot log in.
    </p>

  </div>
</div>
